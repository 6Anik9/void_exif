<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOiD_EXiF // 6ANIK9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.6/piexif.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="hexBg"></canvas>

    <audio id="sfx-click" src="https://www.soundjay.com/communication/sounds/digital-beeps-05.mp3"></audio>
    <audio id="sfx-boot" src="https://www.soundjay.com/buttons/sounds/button-20.mp3"></audio>

    <div id="bootScreen" class="fixed inset-0 z-[300] bg-black flex flex-col items-center justify-center p-6 text-center">
        <div class="relative flex items-center justify-center mb-16">
            <div class="pulse-ring" style="animation-delay: 0s;"></div>
            <div class="pulse-ring" style="animation-delay: 0.5s;"></div>
            <div class="logo-main">VOiD</div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <div class="flex justify-between text-[10px] tracking-widest opacity-60">
                <span id="loadText">ENCRYPTING_CORE</span>
                <span id="loadPercent">0%</span>
            </div>
            <div class="h-[2px] w-full bg-green-900/30 overflow-hidden">
                <div id="progressBar"></div>
            </div>
            <div id="bootLog" class="text-[9px] opacity-30 h-12 overflow-hidden italic font-light"></div>
            <button id="launchBtn" class="hidden w-full btn-sci mt-4">INITIALIZE_STRIKE</button>
        </div>
    </div>

    <div id="appUI" class="hidden app-container">
        <header class="glass-panel p-4 mb-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-white">VOiD_EXiF</h1>
                <p class="text-[8px] opacity-50 tracking-[4px]">SECURED_BY_6ANIK9</p>
            </div>
            <div class="text-[10px] bg-green-500/10 border border-green-500/30 px-2 py-1">v4.0_POWER</div>
        </header>

        <div class="flex flex-col gap-4">
            <div class="glass-panel p-5 space-y-4">
                <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">Binary_Source</p>
                <input type="file" id="fileIn" accept="image/jpeg" class="w-full">
            </div>

            <div id="controls" class="hidden glass-panel p-5 space-y-4">
                <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">Metadata_Injection</p>
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="tagModel" placeholder="DEVICE_MODEL">
                    <input type="text" id="tagSoft" placeholder="SOFTWARE_SIGN">
                    <input type="text" id="tagDate" placeholder="YYYY:MM:DD HH:MM:SS">
                    <input type="text" id="tagGPS" placeholder="LAT, LON (e.g. 23.8, 90.4)">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="injectData()" class="btn-sci text-[10px]">INJECT</button>
                    <button onclick="nukeData()" class="btn-sci text-[10px] border-red-500 text-red-400">PURGE</button>
                </div>
            </div>

            <div class="glass-panel p-2 flex items-center justify-center min-h-[250px] relative overflow-hidden">
                <img id="imgPreview" class="max-h-[300px] w-auto opacity-40 grayscale contrast-125">
                <div class="absolute inset-0 pointer-events-none border-[20px] border-black/20"></div>
            </div>

            <div class="glass-panel p-4">
                <div class="flex justify-between text-[9px] mb-2 opacity-40 font-bold">
                    <span>KERNEL_LOG</span>
                    <button onclick="copyLog()" class="hover:text-white transition">COPY_BUFFER</button>
                </div>
                <div id="terminal" class="text-[10px] h-24 overflow-y-auto font-light leading-relaxed opacity-60 italic"></div>
            </div>
        </div>

        <footer class="fixed bottom-0 left-0 right-0 p-4 bg-black/95 border-t border-green-900/30 flex justify-between items-center px-8 z-[250]">
            <div class="flex gap-6 text-lg">
                <a href="https://github.com/6anik9" target="_blank" class="hover:text-white"><i class="fab fa-github"></i></a>
                <a href="https://instagram.com/6mdaniksheikh9" target="_blank" class="hover:text-pink-500"><i class="fab fa-instagram"></i></a>
                <a href="https://facebook.com/6mdaniksheikh9" target="_blank" class="hover:text-blue-500"><i class="fab fa-facebook-f"></i></a>
            </div>
            <a href="https://6anik9.github.io" target="_blank" class="text-[9px] font-black opacity-30 hover:opacity-100 transition">6ANIK9_DEV</a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
